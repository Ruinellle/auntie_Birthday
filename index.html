<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Afaf — Sana Sa3ida ✨</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body style="margin:0; overflow:hidden; background:#140a02;">
  <main id="app">

    <!-- Intro -->
    <section class="screen active" id="screen-intro" aria-label="Intro">
      <div class="lanterns" aria-hidden="true"></div>

      <div class="card intro-card">
        <h1 class="title shimmer">Waaa Afaf 💛</h1>
        <p class="subtitle">Sana sa3ida ✨ (et j’ai une mini surprise…)</p>
        <p class="tiny">Clique pour commencer 😌</p>
        <button class="btn primary big" id="startBtn">Commencer</button>
      </div>
    </section>

    <!-- Quiz -->
    <section class="screen" id="screen-quiz" aria-label="Questions">
      <div class="card">
        <div class="progress" id="progress"></div>
        <h2 class="question" id="questionText"></h2>

        <div class="buttons">
          <button class="btn danger" id="noBtn">Non</button>
          <button class="btn primary" id="yesBtn">Oui</button>
        </div>

        <p class="tiny" id="hint"></p>
      </div>

      <!-- FX layers -->
      <div class="burst-layer" id="burstLayer" aria-hidden="true"></div>
    </section>

    <!-- Finale -->
    <section class="screen" id="screen-finale" aria-label="Finale">
      <div class="finale-bg" aria-hidden="true"></div>

      <!-- floating kisses -->
      <div class="kisses-layer" id="kissesLayer" aria-hidden="true"></div>

      <!-- Photos will be generated here -->
      <div class="photo-layer" id="photoLayer" aria-hidden="true"></div>

      <div class="finale-overlay">
        <h1 class="finale-title shimmer">Joyeux Anniversaire Afaf 🎉</h1>
        <p class="finale-sub">
          Que Dieu te garde, que ta vie soit douce et remplie de joie. 💛
        </p>
        <p class="tiny finale-tiny">Avec beaucoup d’amour ✨</p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
